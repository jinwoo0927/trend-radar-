# Render Blueprint — 무료 웹서비스로 TrendRadar 배포
# 대시보드 New → Blueprint 로 이 저장소를 연결하면 자동 인식됩니다.
services:
  - type: web
    name: trend-radar
    runtime: docker
    plan: free                     # 무료 플랜 (15분 미사용 시 슬립 → UptimeRobot로 방지)
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # ── AI (무료 Gemini) ── Render 대시보드에서 값 입력 (secret)
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false                # 대시보드에서 직접 입력
      # ── 데이터 영속화 (Supabase 무료) ── 대시보드에서 입력
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # ── 유튜브 대본 ──
      - key: YTDLP_CMD
        value: python3 -m yt_dlp
      # ── 수집 주기 ──
      - key: COLLECT_INTERVAL_MIN
        value: "180"
